<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Store</title>
</head>

<body>
    <header>
        <h1>Arctic Store</h1>
    </header>
    <main>
        <section class="cart-items">
            <h2>Your cart</h2>
            <article class="cart-item-card">
                <header>
                    <h3>Fjallraven - Foldsack No. 1</h3>
                </header>
                <img src="https://fakestoreapi.com/img/81fPKd-2AYL._AC_SL1500_t.png" alt="Fjallraven - Foldsack No. 1">
                <p>Price: <span class="price"></span></p>
                <p>Color: <span class="color"></span></p>
                <p>Size: <span class="size"></span></p>

                <select class="quantity-box" name="quantity">
                    <option class="quantity-option" value="1">1</option>
                </select>
                <button class="remove-single-stock">
                    &#x2715
                </button>
                <p class="product-sum"> </p>
            </article>
        </section>
        <section class="sum-section">
            <button class="remove-all-stock">
                Clear cart
            </button>
            <p class="total-sum"> </p>
        </section>
    </main>
</body>

</html>
