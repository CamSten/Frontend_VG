<!DOCTYPE html>
<html lang="en">

<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="productGridCSS.css">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arctic Store</title>
</head>

<body>
    <header class="main-header">

        <div class="container" id="headerContainer">
            <div class="row">
                <div class="col-sm-2" id="headerLink">

                </div>
                <div class="col-sm-8">
                    <h1>Arctic Store</h1>
                </div>
                <div class="col-sm-1">
                    <button class="cartButton" id="cartSymbol">
                        <i class="fa-solid fa-cart-shopping fa-2x" id="cSymbol"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row">
            <div class="col">
                <div id="allCategoryButtons" class="d-flex flex-wrap"></div>
            </div>
        </div>
    </div>

    <main>
        <div class="container">
            <div class="row row-cols-2 row-cols-lg-4 g-4" id="productGrid"></div>

        </div>
    </main>
    <script src="productGridJS.js"> </script>
</body>

</html>
